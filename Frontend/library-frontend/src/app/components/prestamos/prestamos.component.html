<div class="card">
  <h2>📖 Préstamos</h2>

  <!-- 🔍 BÚSQUEDA PRINCIPAL -->
  <div class="search-bar">
    <input class="search"
           [(ngModel)]="searchPrestamo"
           (input)="filtrarPrestamos()"
           placeholder="🔍 Buscar por usuario, libro o fecha...">
  </div>

  <!-- 🧩 FORM CREAR PRÉSTAMO -->
  <div class="form compact">

    <!-- USUARIO -->
    <div class="field">
      <input [(ngModel)]="searchUsuario"
             (input)="filtrarUsuarios()"
             placeholder="Buscar usuario">

      <!-- 🔽 SUGERENCIAS -->
      <ul class="dropdown" *ngIf="usuariosFiltrados.length > 0">
        <li *ngFor="let u of usuariosFiltrados"
            (click)="seleccionarUsuario(u)">
          {{u.nombre}}
        </li>
      </ul>

      <small *ngIf="usuarioSeleccionado">
        Seleccionado: {{usuarioSeleccionado.nombre}}
      </small>
    </div>

    <!-- LIBRO -->
    <div class="field">
      <input [(ngModel)]="searchLibro"
             (input)="filtrarLibros()"
             placeholder="Buscar libro">

      <!-- 🔽 SUGERENCIAS -->
      <ul class="dropdown" *ngIf="librosFiltrados.length > 0">
        <li *ngFor="let l of librosFiltrados"
            (click)="seleccionarLibro(l)">
          {{l.titulo}}
        </li>
      </ul>

      <small *ngIf="libroSeleccionado">
        Seleccionado: {{libroSeleccionado.titulo}}
      </small>
    </div>

    <button (click)="prestar()">➕ Prestar</button>
  </div>

  <!-- 📋 LISTA -->
  <div class="list">

    <div class="item" *ngFor="let p of prestamosFiltrados">

      <div class="info">
        <strong>👤 {{p.usuario?.nombre}}</strong>
        <span> → 📚 {{p.libro?.titulo}}</span>
        <p class="date">📅 {{p.fechaPrestamo}}</p>
      </div>

      <div class="actions">

        <button *ngIf="!p.fechaDevolucion"
                (click)="devolver(p.id)">
          ✔ Devolver
        </button>

        <span *ngIf="p.fechaDevolucion" class="returned">
          Devuelto: {{p.fechaDevolucion}}
        </span>

      </div>

    </div>

  </div>
</div>
